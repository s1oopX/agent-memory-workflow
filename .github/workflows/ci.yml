name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify workflow on Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run CI checks
        shell: pwsh
        run: npm run ci
